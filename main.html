<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech Challenge</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #2e7d32, #66bb6a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contenedor{
            background:white;
            width:80%;
            max-width:700px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#2e7d32;
            margin-bottom:15px;
        }

        h2{
            color:#555;
            margin-bottom:20px;
        }

        p{
            color:#666;
            margin-bottom:30px;
            line-height:1.6;
        }

        button{
            background:#2e7d32;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        a{
            text-decoration: none;
            color: antiquewhite;
        }

        
    </style>
</head>

<body>

    <div class="contenedor">

        <h1>♻ T5 Recicla</h1>

        <h2>Proyecto de Concientización Ambiental para la Comunidad Educativa de la Escuela Técnica N.º 5</h2>

        <p>
            Aprendé a cuidar el ambiente mientras jugás. 
            Poné a prueba tus conocimientos sobre reciclaje, 
            separación de residuos y sostenibilidad para generar 
            un impacto positivo en nuestra escuela.
        </p>

        <button>
        <a href="index.html">Comenzar</a>
        </button>

    </div>
            
        

</body>
</html>
